{% extends 'base.html' %}
{% block title %}Create Account — EMERGIX{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 68px);display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;">
  <div style="width:100%;max-width:440px;">
    <div class="glass" style="padding:2.5rem 2rem;">
      <div style="text-align:center;margin-bottom:2rem;">
        <div style="width:64px;height:64px;background:linear-gradient(135deg,var(--teal),var(--teal-dark));border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:0 8px 24px rgba(10,147,150,.3);">
          <i class="fa-solid fa-user-plus" style="font-size:1.5rem;color:white"></i>
        </div>
        <h2 style="color:var(--teal-dark);margin-bottom:.3rem">Create Account</h2>
        <p style="font-size:.9rem">Free for patients — takes 30 seconds</p>
      </div>

      <!-- Google Sign-Up -->
      {% if google_enabled %}
      <a href="{{ url_for('auth.google_login') }}"
         style="display:flex;align-items:center;justify-content:center;gap:.75rem;width:100%;padding:.75rem 1rem;background:white;border:1.5px solid #DDE5EC;border-radius:10px;font-weight:600;font-size:.95rem;color:#3C4043;text-decoration:none;margin-bottom:1.25rem;transition:all .2s ease;box-shadow:0 1px 4px rgba(0,0,0,.08);"
         onmouseover="this.style.boxShadow='0 3px 12px rgba(0,0,0,.15)';this.style.borderColor='#c5c5c5'"
         onmouseout="this.style.boxShadow='0 1px 4px rgba(0,0,0,.08)';this.style.borderColor='#DDE5EC'">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Sign up with Google
      </a>
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;">
        <div style="flex:1;height:1px;background:#DDE5EC"></div>
        <span style="font-size:.8rem;color:var(--slate-light);font-weight:500">or register with email</span>
        <div style="flex:1;height:1px;background:#DDE5EC"></div>
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label class="form-label"><i class="fa-solid fa-user"></i> Full Name</label>
          <input type="text" class="form-control" name="full_name"
                 value="{{ form_data.get('full_name','') }}"
                 placeholder="Your full name" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fa-solid fa-envelope"></i> Email Address</label>
          <input type="email" class="form-control" name="email"
                 value="{{ form_data.get('email','') }}"
                 placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fa-solid fa-phone"></i> Mobile Number</label>
          <input type="tel" class="form-control" name="phone"
                 value="{{ form_data.get('phone','') }}"
                 placeholder="10-digit mobile number" maxlength="10" required>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
          <div class="form-group">
            <label class="form-label"><i class="fa-solid fa-lock"></i> Password</label>
            <input type="password" class="form-control" name="password"
                   id="reg-password" placeholder="Min 8 chars" required minlength="8">
          </div>
          <div class="form-group">
            <label class="form-label"><i class="fa-solid fa-lock"></i> Confirm</label>
            <input type="password" class="form-control" name="confirm_password"
                   id="reg-confirm" placeholder="Repeat" required>
          </div>
        </div>
        <div id="pwd-match-hint" style="font-size:.8rem;margin-top:-.5rem;margin-bottom:.75rem;display:none;"></div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:.25rem">
          <i class="fa-solid fa-rocket"></i> Create My Account
        </button>
      </form>

      <div style="text-align:center;margin-top:1.5rem;font-size:.88rem;color:var(--slate)">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" style="font-weight:600">Sign in →</a>
      </div>
    </div>
  </div>
</div>
<script>
const p=document.getElementById('reg-password'),c=document.getElementById('reg-confirm'),h=document.getElementById('pwd-match-hint');
function chk(){if(!c.value)return h.style.display='none';const ok=p.value===c.value;h.style.display='block';h.textContent=ok?'✓ Passwords match':'✗ Passwords do not match';h.style.color=ok?'var(--success)':'var(--danger)';}
p.addEventListener('input',chk);c.addEventListener('input',chk);
</script>
<style>@media(max-width:400px){div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}}</style>
{% endblock %}
