{% extends 'base.html' %}
{% block title %}Page Not Found — EMERGIX{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 68px);display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="text-align:center;max-width:480px;">
    <div style="font-size:6rem;font-family:var(--font-display);font-weight:800;color:var(--teal-light);line-height:1;margin-bottom:1rem">404</div>
    <h2 style="color:var(--teal-dark);margin-bottom:.75rem">Page Not Found</h2>
    <p style="color:var(--slate);margin-bottom:2rem;line-height:1.7">The page you're looking for doesn't exist. It may have been moved or the link may be incorrect.</p>
    <a href="{{ url_for('main.landing') }}" class="btn btn-primary btn-lg">
      <i class="fa-solid fa-house"></i> Back to Home
    </a>
  </div>
</div>
{% endblock %}
