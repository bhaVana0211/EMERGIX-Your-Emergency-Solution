version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://emergix:emergix@db:5432/emergix_db
      - REDIS_URL=redis://redis:6379/0
      - SOCKETIO_MESSAGE_QUEUE=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-emergix-dev-secret-key}
    depends_on:
      - db
      - redis
    networks:
      - emergix-net

  simulator:
    build: .
    command: python mock_bed_simulator.py
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://emergix:emergix@db:5432/emergix_db
      - REDIS_URL=redis://redis:6379/0
      - SOCKETIO_MESSAGE_QUEUE=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - emergix-net

  db:
    image: postgis/postgis:16-3.4
    environment:
      - POSTGRES_USER=emergix
      - POSTGRES_PASSWORD=emergix
      - POSTGRES_DB=emergix_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - emergix-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - emergix-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - emergix-net

networks:
  emergix-net:

volumes:
  pgdata:
