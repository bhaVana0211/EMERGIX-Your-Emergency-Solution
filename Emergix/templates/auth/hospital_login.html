{% extends "base.html" %}

{% block title %}Hospital Admin Login - EMERGIX{% endblock %}

{% block content %}
<!-- Different background for admin login to visually distinguish -->
<div class="fixed inset-0 bg-[#005F73] -z-10"></div>
<div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
    <div class="blob bg-[#0A9396] w-96 h-96 rounded-full top-[10%] left-[20%] mix-blend-screen opacity-30"></div>
    <div class="blob bg-[#E9C46A] w-64 h-64 rounded-full bottom-[20%] right-[15%] mix-blend-screen opacity-20"></div>
</div>

<div class="flex-grow flex items-center justify-center px-4 py-12 relative z-10">
    <div class="w-full max-w-md glass-card p-8 bg-white/95 border-none shadow-2xl">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-deep text-white rounded-full flex items-center justify-center text-2xl mx-auto mb-4 shadow-lg shadow-deep/40">
                <i class="fa-solid fa-hospital"></i>
            </div>
            <h2 class="text-2xl font-bold text-deep">Hospital Staff Portal</h2>
            <p class="text-gray-500 mt-2 text-sm">Secure access for hospital administration and bed management.</p>
        </div>

        <form method="POST" action="{{ url_for('auth.hospital_login') }}" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Admin ID / Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="fa-solid fa-id-badge"></i>
                    </div>
                    <input type="text" id="username" name="username" required 
                           class="form-input w-full bg-white pl-10" 
                           placeholder="e.g., admin_aiims">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" id="password" name="password" required 
                           class="form-input w-full bg-white pl-10" 
                           placeholder="Enter admin password">
                </div>
            </div>

            <button type="submit" class="w-full bg-deep hover:bg-[#004d5e] text-white py-3 rounded-lg font-semibold shadow-lg shadow-deep/30 transition-all transform hover:scale-[1.02] flex items-center justify-center gap-2">
                Secure Login <i class="fa-solid fa-shield-halved"></i>
            </button>
        </form>

        <div class="mt-8 text-center border-t border-gray-200 pt-6 text-sm">
            <a href="{{ url_for('auth.login') }}" class="text-gray-500 hover:text-brand flex items-center justify-center gap-1 transition">
                <i class="fa-solid fa-arrow-left"></i> Back to Patient Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
