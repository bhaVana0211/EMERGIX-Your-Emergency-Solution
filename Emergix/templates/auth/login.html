{% extends "base.html" %}

{% block title %}Login - EMERGIX{% endblock %}

{% block content %}
<div class="flex-grow flex items-center justify-center px-4 py-12 relative z-10">
    <div class="w-full max-w-md glass-card p-8 bg-white/80">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-brand/10 text-brand rounded-full flex items-center justify-center text-2xl mx-auto mb-4">
                <i class="fa-solid fa-user"></i>
            </div>
            <h2 class="text-2xl font-bold text-deep">Welcome Back</h2>
            <p class="text-gray-500 mt-2">Log in to search and book hospital beds.</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-6">
            <div>
                <label for="login_id" class="block text-sm font-medium text-gray-700 mb-1">Username, Email, or Phone</label>
                <input type="text" id="login_id" name="login_id" required 
                       class="form-input w-full bg-white/90" 
                       placeholder="Enter your login ID">
            </div>

            <div>
                <div class="flex items-center justify-between mb-1">
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                </div>
                <input type="password" id="password" name="password" required 
                       class="form-input w-full bg-white/90" 
                       placeholder="Enter password">
            </div>

            <button type="submit" class="btn-primary w-full py-3 text-lg flex items-center justify-center gap-2">
                Login <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="mt-6">
            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">Or continue with</span>
                </div>
            </div>

            <div class="mt-6">
                <a href="{{ url_for('auth.google_login') }}" class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-gray-300 rounded-lg shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                    Sign in with Google
                </a>
            </div>
        </div>

        <div class="mt-8 text-center border-t border-gray-200 pt-6">
            <p class="text-gray-600">Don't have an account?</p>
            <a href="{{ url_for('auth.register') }}" class="text-brand font-semibold hover:underline mt-1 inline-block">Create an account</a>
        </div>
        
        <div class="mt-6 text-center text-sm">
            <a href="{{ url_for('auth.hospital_login') }}" class="text-gray-500 hover:text-deep flex items-center justify-center gap-1 transition">
                <i class="fa-solid fa-user-doctor"></i> Login as Hospital Staff
            </a>
        </div>
    </div>
</div>
{% endblock %}
