{% extends "base.html" %}

{% block title %}Find Nearby Hospitals - EMERGIX{% endblock %}

{% block content %}
<div x-data="hospitalDiscovery" class="w-full">
    <!-- Header / Location Banner -->
    <div class="bg-deep text-white py-4 shadow-md sticky top-16 z-40">
        <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-location-dot text-brand text-xl"></i>
                <div>
                    <div class="text-xs text-brand uppercase font-bold tracking-wider">Your Location</div>
                    <div class="font-medium text-lg" x-text="userAddress || locationStatus"></div>
                </div>
            </div>
            
            <!-- Manual Location Search (Fallback) -->
            <div class="w-full md:w-auto relative" x-show="locationError || !userLat">
                <input type="text" x-model="searchQuery" @keydown.enter="manualSearch" 
                       placeholder="Enter area (e.g. Andheri, Mumbai)" 
                       class="w-full md:w-80 pl-4 pr-10 py-2 rounded-full text-gray-800 focus:outline-none focus:ring-2 focus:ring-brand">
                <button @click="manualSearch" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-brand">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="bg-white/80 backdrop-blur-md border-b border-gray-200 sticky top-[104px] z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center gap-4 text-sm">
            
            <!-- Bed Types Chips -->
            <div class="flex-grow flex items-center gap-2 overflow-x-auto pb-1 scrollbar-hide">
                <span class="text-gray-500 font-medium mr-2 whitespace-nowrap">Filter:</span>
                <template x-for="type in bedTypes" :key="type.id">
                    <button @click="toggleBedType(type.id)"
                            class="px-3 py-1.5 rounded-full border whitespace-nowrap transition-colors"
                            :class="selectedBedTypes.includes(type.id) ? 'bg-brand text-white border-brand shadow-sm shadow-brand/30' : 'bg-white text-gray-600 border-gray-300 hover:border-brand'">
                        <span x-text="type.label"></span>
                    </button>
                </template>
            </div>
            
            <!-- Radius Slider -->
            <div class="flex items-center gap-3 border-l pl-4 shrink-0">
                <span class="text-gray-500 font-medium"><i class="fa-solid fa-compass text-gray-400"></i> Distance:</span>
                <input type="range" x-model="radius" min="1" max="50" step="1" class="w-24 accent-brand cursor-pointer">
                <span class="font-semibold text-deep w-12" x-text="radius + ' km'"></span>
            </div>

            <!-- Toggles -->
            <div class="flex items-center gap-4 border-l pl-4 shrink-0">
                <select x-model="selectedType" class="bg-transparent font-medium text-gray-700 focus:outline-none cursor-pointer">
                    <option value="all">All Hospitals</option>
                    <option value="government">Govt Only</option>
                    <option value="private">Private Only</option>
                </select>

                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" x-model="availableOnly" class="rounded text-brand focus:ring-brand accent-brand w-4 h-4">
                    <span class="font-medium text-gray-700">Available only</span>
                </label>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- Error State -->
        <div x-show="locationError" class="bg-red-50 border border-alert text-alert p-4 rounded-xl flex items-center gap-3 mb-6" style="display: none;">
            <i class="fa-solid fa-triangle-exclamation text-xl"></i>
            <span x-text="locationError"></span>
        </div>

        <!-- Skeleton Loading State -->
        <div x-show="isLoading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="i in 6" :key="i">
                <div class="glass-card p-6 h-80 skeleton rounded-xl"></div>
            </template>
        </div>

        <!-- Empty State -->
        <div x-show="!isLoading && filteredHospitals.length === 0 && userLat" class="text-center py-20" style="display: none;">
            <div class="text-6xl text-gray-300 mb-4"><i class="fa-solid fa-location-crosshairs"></i></div>
            <h3 class="text-2xl font-bold text-deep mb-2">Location Not Served</h3>
            <p class="text-gray-500 mb-6">We don't serve that location right now, or there are no hospitals within <span x-text="radius"></span> km.</p>
            <button @click="radius = 50" class="btn-primary">Expand search radius</button>
        </div>

        <!-- Hospital Cards Grid -->
        <div x-show="!isLoading && filteredHospitals.length > 0" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" style="display: none;">
            <template x-for="hospital in filteredHospitals" :key="hospital.id">
                <div class="glass-card flex flex-col h-full hover:border-brand/30 transition-colors relative overflow-hidden">
                    
                    <!-- Top Ribbon -->
                    <div class="absolute top-0 left-0 w-full h-1" 
                         :class="hospital.total_available === 0 ? 'bg-alert' : (hospital.total_available < 10 ? 'bg-warning' : 'bg-success')"></div>

                    <div class="p-5 flex-grow cursor-pointer" @click="window.location.href = `/hospitals/${hospital.id}`">
                        
                        <!-- Header -->
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-xl font-bold text-deep leading-tight pr-4" x-text="hospital.name"></h3>
                            <div class="flex flex-col items-end shrink-0">
                                <span class="bg-brand/10 text-brand text-xs font-bold px-2 py-1 rounded uppercase tracking-wider" x-text="hospital.hospital_type"></span>
                                <div class="text-sm font-semibold text-gray-500 mt-1 flex items-center gap-1">
                                    <i class="fa-solid fa-location-arrow text-brand/70 text-xs"></i>
                                    <span x-text="hospital.distance_km + ' km'"></span>
                                </div>
                            </div>
                        </div>
                        
                        <p class="text-gray-500 text-sm mb-4 truncate"><i class="fa-solid fa-map-pin mr-1 text-gray-400"></i><span x-text="hospital.address"></span></p>

                        <!-- Bed Grid -->
                        <div class="grid grid-cols-2 lg:grid-cols-4 gap-2 mb-4">
                            <template x-for="bed in hospital.bed_inventory" :key="bed.bed_type">
                                <div class="bg-gray-50 rounded-lg p-2 border border-gray-100 flex flex-col justify-between"
                                     :class="{ 'opacity-50 grayscale': bed.total === 0, 'ring-1 ring-brand bg-brand/5': selectedBedTypes.includes(bed.bed_type) }">
                                    <div class="text-[10px] text-gray-500 uppercase font-bold tracking-wide truncate mb-1">
                                        <i class="fa-solid mr-1 text-deep/50" :class="{
                                            'fa-bed': bed.bed_type === 'general',
                                            'fa-heart-pulse': bed.bed_type === 'icu',
                                            'fa-lungs': bed.bed_type === 'oxygen',
                                            'fa-fan': bed.bed_type === 'ventilator',
                                            'fa-stethoscope': bed.bed_type === 'opd',
                                            'fa-truck-medical': bed.bed_type === 'emergency',
                                            'fa-baby': bed.bed_type === 'pediatric',
                                            'fa-person-pregnant': bed.bed_type === 'maternity'
                                        }"></i>
                                        <span x-text="bed.bed_type"></span>
                                    </div>
                                    
                                    <div class="flex items-end justify-between mb-1">
                                        <template x-if="bed.available === 0 && bed.total > 0">
                                            <span class="text-xs font-bold text-alert bg-alert/10 px-1 rounded">FULL</span>
                                        </template>
                                        <template x-if="bed.available > 0 || bed.total === 0">
                                            <span class="text-lg font-bold leading-none" 
                                                  :class="bed.occupancy_pct >= 80 ? 'text-warning' : 'text-success'"
                                                  x-text="bed.available"></span>
                                        </template>
                                        <span class="text-xs text-gray-400">/<span x-text="bed.total"></span></span>
                                    </div>
                                    
                                    <!-- Mini Progress bar -->
                                    <div class="w-full h-1 bg-gray-200 rounded-full overflow-hidden">
                                        <div class="h-full rounded-full transition-all duration-500"
                                             :class="getOccupancyClass(bed.occupancy_pct)"
                                             :style="`width: ${Math.min(100, bed.occupancy_pct)}%`"></div>
                                    </div>
                                </div>
                            </template>
                        </div>
                        
                        <div class="text-xs text-gray-400 text-right">
                            Updated: <span x-text="hospital.last_updated ? new Date(hospital.last_updated).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Unknown'"></span>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="p-4 bg-gray-50/50 border-t border-gray-100 flex gap-3">
                        <a :href="getNavUrl(hospital)" target="_blank" class="flex-1 btn-secondary text-center py-2 px-0 text-sm flex items-center justify-center gap-1">
                            <i class="fa-solid fa-diamond-turn-right text-brand"></i> Navigate
                        </a>
                        <button @click="$dispatch('open-alert-modal', { hospital: hospital, userLat: userLat, userLng: userLng, selectedBed: selectedBedTypes.length === 1 ? selectedBedTypes[0] : 'general' })" 
                                class="flex-1 btn-primary text-center py-2 px-0 text-sm flex items-center justify-center gap-1"
                                :class="hospital.total_available === 0 ? 'opacity-50 cursor-not-allowed' : ''"
                                :disabled="hospital.total_available === 0">
                            <i class="fa-regular fa-bell"></i> Alert / Book
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Alert Modal Component Injection -->
    {% include 'partials/alert_modal.html' %}
</div>

<!-- Global listener for live bed updates from Socket.IO -->
<script>
    document.addEventListener('live-bed-update', (e) => {
        const update = e.detail;
        // The Alpine component will react to this custom event if needed
        const el = document.querySelector('[x-data="hospitalDiscovery"]');
        if (el && el.__x) {
            const data = el.__x.$data;
            const hospital = data.hospitals.find(h => h.id === update.hospital_id);
            if (hospital) {
                const bed = hospital.bed_inventory.find(b => b.bed_type === update.bed_type);
                if (bed) {
                    // Temporarily store old to calculate diff
                    const oldAvail = bed.available;
                    bed.available = update.available_beds;
                    bed.total = update.total_beds;
                    bed.occupancy_pct = update.occupancy_pct;
                    hospital.last_updated = update.updated_at;
                    
                    // Update totals
                    hospital.total_available += (update.available_beds - oldAvail);
                }
            }
        }
    });
</script>
{% endblock %}
