<div x-data="alertModal" 
     @open-alert-modal.window="openModal($event.detail.hospital, $event.detail.selectedBed, $event.detail.userLat, $event.detail.userLng)"
     x-show="isOpen" 
     style="display: none;" 
     class="fixed inset-0 z-50 overflow-y-auto flex items-end sm:items-center justify-center">
    
    <!-- Backdrop -->
    <div x-show="isOpen" 
         x-transition:enter="transition-opacity ease-linear duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition-opacity ease-linear duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm" 
         @click="closeModal"></div>

    <!-- Modal Panel -->
    <div x-show="isOpen" 
         class="modal-enter-active relative bg-white sm:rounded-2xl w-full sm:max-w-lg shadow-2xl overflow-hidden flex flex-col max-h-[90vh]"
         :class="isOpen ? 'modal-enter-active' : 'modal-leave-active'"
         @click.stop>
        
        <!-- Header -->
        <div class="bg-deep text-white px-6 py-4 flex justify-between items-center shrink-0">
            <div>
                <h3 class="text-xl font-bold">Pre-Arrival Alert</h3>
                <p class="text-white/70 text-sm truncate max-w-[250px]" x-text="hospital ? hospital.name : ''"></p>
            </div>
            <button @click="closeModal" class="text-white/70 hover:text-white bg-white/10 hover:bg-white/20 w-8 h-8 rounded-full flex items-center justify-center transition">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <!-- Success State -->
        <div x-show="isSuccess" class="p-8 text-center flex-grow overflow-y-auto" style="display: none;">
            <div class="w-20 h-20 bg-success/10 text-success rounded-full flex items-center justify-center text-4xl mx-auto mb-6">
                <i class="fa-solid fa-check"></i>
            </div>
            <h3 class="text-2xl font-bold text-deep mb-2">Alert Sent Successfully!</h3>
            <p class="text-gray-600 mb-6">The hospital has been notified of your arrival.</p>
            
            <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 mb-8 inline-block">
                <div class="text-xs text-gray-500 uppercase font-bold tracking-wider mb-1">Booking Reference</div>
                <div class="text-2xl font-mono font-bold text-brand tracking-widest" x-text="bookingRef"></div>
            </div>
            
            <div class="flex gap-4 justify-center">
                <a :href="hospital ? `https://www.google.com/maps/dir/?api=1&origin=${formData.user_lat},${formData.user_lng}&destination=${hospital.latitude},${hospital.longitude}&travelmode=driving` : '#'" 
                   target="_blank" class="btn-primary flex items-center justify-center gap-2">
                    <i class="fa-solid fa-diamond-turn-right"></i> Start Navigation
                </a>
                <button @click="closeModal" class="btn-secondary">Close</button>
            </div>
        </div>

        <!-- Form State -->
        <div x-show="!isSuccess" class="p-6 overflow-y-auto flex-grow bg-soft">
            <div x-show="error" class="mb-4 bg-red-50 border border-alert text-alert px-4 py-3 rounded-lg text-sm flex items-start gap-2" style="display: none;">
                <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
                <span x-text="error"></span>
            </div>

            <form @submit.prevent="submitAlert" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Patient Name <span class="text-alert">*</span></label>
                        <input type="text" x-model="formData.patient_name" required class="form-input" placeholder="Full name of patient">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Age</label>
                        <input type="number" x-model="formData.patient_age" class="form-input" placeholder="Years" min="0" max="120">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Gender</label>
                        <select x-model="formData.patient_gender" class="form-input bg-white cursor-pointer">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Contact Phone <span class="text-alert">*</span></label>
                        <input type="tel" x-model="formData.contact_phone" required pattern="[0-9]{10}" class="form-input" placeholder="10-digit number for hospital to contact">
                    </div>

                    <div class="col-span-2 sm:col-span-1">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Bed Type Needed</label>
                        <select x-model="formData.bed_type_needed" class="form-input bg-white cursor-pointer font-medium text-brand">
                            {% for bt in BED_TYPES %}
                            <option value="{{ bt }}">{{ BED_TYPE_LABELS[bt] }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-span-2 sm:col-span-1">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Est. Arrival</label>
                        <select x-model="formData.est_arrival_min" class="form-input bg-white cursor-pointer text-alert font-medium">
                            <option value="15">In 15 minutes</option>
                            <option value="30">In 30 minutes</option>
                            <option value="45">In 45 minutes</option>
                            <option value="60">In 1 hour</option>
                            <option value="90">More than 1 hour</option>
                        </select>
                    </div>

                    <div class="col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Additional Notes</label>
                        <textarea x-model="formData.notes" rows="2" maxlength="200" class="form-input resize-none" placeholder="Brief description of condition (e.g. chest pain, accident)"></textarea>
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-200 flex justify-end gap-3 mt-6">
                    <button type="button" @click="closeModal" class="px-5 py-2.5 rounded-lg font-medium text-gray-600 hover:bg-gray-200 transition">Cancel</button>
                    <button type="submit" class="btn-primary py-2.5 flex items-center justify-center gap-2 min-w-[140px]" :disabled="isSubmitting">
                        <span x-show="!isSubmitting">Send Alert <i class="fa-solid fa-paper-plane text-sm"></i></span>
                        <span x-show="isSubmitting" style="display: none;"><i class="fa-solid fa-spinner fa-spin"></i> Sending...</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
