{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="fixed top-20 right-4 z-50 flex flex-col gap-2 max-w-sm w-full" x-data="{ messages: [] }" x-init='
        const msgs = {{ messages|tojson }};
        msgs.forEach((m, i) => {
            setTimeout(() => {
                messages.push({id: i, category: m[0], text: m[1]});
                setTimeout(() => {
                    messages = messages.filter(msg => msg.id !== i);
                }, 4000);
            }, i * 100);
        });
    '>
      <template x-for="msg in messages" :key="msg.id">
        <div x-show="true" 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-x-8"
             x-transition:enter-end="opacity-100 translate-x-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-x-0"
             x-transition:leave-end="opacity-0 translate-x-8"
             class="glass-card shadow-lg rounded-xl overflow-hidden"
             :class="{
                'border-l-4 border-l-success': msg.category === 'success',
                'border-l-4 border-l-alert': msg.category === 'danger' || msg.category === 'error',
                'border-l-4 border-l-warning': msg.category === 'warning',
                'border-l-4 border-l-brand': msg.category === 'info',
                'border-l-4 border-l-gray-400': !['success', 'danger', 'error', 'warning', 'info'].includes(msg.category)
             }">
            <div class="px-4 py-3 bg-white/90 flex items-center justify-between">
                <p class="text-sm font-medium text-gray-800" x-text="msg.text"></p>
                <button @click="messages = messages.filter(m => m.id !== msg.id)" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </div>
      </template>
    </div>
  {% endif %}
{% endwith %}
